name: Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/meeting_note
      NEON_AUTH_JWKS_URL: https://auth.example.com/.well-known/jwks.json
      NEON_AUTH_ISSUER: https://auth.example.com
      NEON_AUTH_COOKIE_SECRET: ci-only-cookie-secret-at-least-32-characters
      R2_ACCOUNT_ID: ci-account
      R2_ACCESS_KEY_ID: ci-access-key
      R2_SECRET_ACCESS_KEY: ci-secret-key
      R2_BUCKET: ci-bucket
      RECALL_API_KEY: ci-recall-key
      RECALL_WEBHOOK_SECRET: whsec_ci
      ELEVENLABS_WEBHOOK_SECRET: ci-elevenlabs-webhook-secret
      OPENROUTER_API_KEY: ci-openrouter-key
      OPENROUTER_MODEL: ci-model
      INNGEST_EVENT_KEY: ci-event-key
      INNGEST_SIGNING_KEY: ci-signing-key
      NEXT_PUBLIC_APP_URL: https://tape.inevitable.tech
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  mac-recorder:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
      - run: npm run test:sidecar
      - run: npm run test:swift

  mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
        working-directory: mcp/meeting-note
      - run: uv run python -m unittest
        working-directory: mcp/meeting-note
        env:
          DISABLE_AUTH: "true"
          MCP_ALLOW_DEV_AUTH: "true"
          MCP_DEV_USER_EMAIL: tester@example.com
          MCP_HOST: 127.0.0.1
