name: Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run verify
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  mac-recorder:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
      - run: npm run test:sidecar
      - run: npm run test:swift

  mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
        working-directory: mcp/meeting-note
      - run: uv run python -m unittest
        working-directory: mcp/meeting-note
        env:
          DISABLE_AUTH: "true"
          MCP_ALLOW_DEV_AUTH: "true"
          MCP_DEV_USER_EMAIL: tester@example.com
          MCP_HOST: 127.0.0.1
