name: Vercel Dashboard Check

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready

permissions:
  contents: read
  statuses: write

jobs:
  dashboard:
    name: Dashboard readiness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check dashboard readiness
        env:
          DEPLOYMENT_URL: ${{ github.event.client_payload.url }}
        run: >-
          curl --fail --show-error --silent
          --retry 5 --retry-all-errors --retry-delay 5
          "${DEPLOYMENT_URL%/}/api/health/dashboard"

      - name: Set Vercel status pending
        if: always()
        env:
          DEPLOYMENT_SHA: ${{ github.event.client_payload.git.sha }}
          GH_TOKEN: ${{ github.token }}
          STATUS_CONTEXT: "Vercel - meeting-note: dashboard"
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: >-
          gh api --method POST
          "repos/${GITHUB_REPOSITORY}/statuses/${DEPLOYMENT_SHA}"
          -f state=pending
          -f "context=${STATUS_CONTEXT}"
          -f "target_url=${STATUS_TARGET_URL}"

      - name: Notify Vercel
        if: always()
        env:
          DEPLOYMENT_SHA: ${{ github.event.client_payload.git.sha }}
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          STATUS_CONTEXT: "Vercel - meeting-note: dashboard"
          STATUS_TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          state="$JOB_STATUS"
          if [[ "$state" != "success" ]]; then
            state="failure"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${DEPLOYMENT_SHA}" \
            -f "state=${state}" \
            -f "context=${STATUS_CONTEXT}" \
            -f "target_url=${STATUS_TARGET_URL}"
